server:
  port: 8081

spring:
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-processor
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.uniclass.lab"
        spring.json.value.default.type: com.uniclass.lab.OrderEvent
        spring.json.use.type.headers: false
        max.poll.records: ${LAB_MAX_POLL_RECORDS:50}
        max.poll.interval.ms: ${LAB_MAX_POLL_INTERVAL_MS:10000}
        session.timeout.ms: ${LAB_SESSION_TIMEOUT_MS:10000}
        heartbeat.interval.ms: ${LAB_HEARTBEAT_INTERVAL_MS:3000}
        partition.assignment.strategy: ${LAB_PARTITION_ASSIGNOR:org.apache.kafka.clients.consumer.RangeAssignor}
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

lab:
  concurrency: ${LAB_CONCURRENCY:3}
  normal-processing-ms: ${LAB_NORMAL_PROCESSING_MS:50}
  poison-processing-ms: ${LAB_POISON_PROCESSING_MS:20000}
