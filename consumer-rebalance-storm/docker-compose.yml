version: '3.8'

services:

  # ─── Infrastructure ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: storm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: storm-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false
      KAFKA_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Tự động tạo topic khi kafka ready
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: storm-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Tạo topic order-event với 6 partitions...' &&
        kafka-topics --create --topic order-event --partitions 6 --replication-factor 1 --if-not-exists --bootstrap-server kafka:9092 &&
        echo 'Topic đã tạo xong!'
      "

  # Kafka UI — xem consumer group / rebalance / lag trực quan tại http://localhost:8080
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: storm-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-lab
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ─── Spring Boot Consumer ──────────────────────────────────────────
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: storm-consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LAB_CONCURRENCY: 3
      LAB_NORMAL_PROCESSING_MS: 50
      # ── Kịch bản STORM (mặc định) ──────────────────────────────────
      # Poison message giả treo 20s > max.poll.interval.ms 10s → bị đuổi khỏi group
      LAB_POISON_PROCESSING_MS: 20000
      LAB_MAX_POLL_INTERVAL_MS: 10000
      LAB_MAX_POLL_RECORDS: 50
      LAB_SESSION_TIMEOUT_MS: 10000
      LAB_HEARTBEAT_INTERVAL_MS: 3000
      LAB_PARTITION_ASSIGNOR: org.apache.kafka.clients.consumer.RangeAssignor
    # Xem log consumer: docker logs -f storm-consumer

  # ─── Python Producer ───────────────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: storm-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LAB_RATE_PER_SEC: 15
      LAB_DURATION_SEC: 240
      LAB_POISON_RATE: 0.03
    # Không tự chạy — chạy thủ công: docker compose run --rm producer

  # ─── Monitor / chẩn đoán ────────────────────────────────────────────
  monitor:
    build:
      context: ./result
      dockerfile: Dockerfile
    container_name: storm-monitor
    depends_on:
      - consumer
    environment:
      CONSUMER_URL: http://consumer:8081
      LAB_MONITOR_SECONDS: 240
      LAB_MONITOR_INTERVAL_SEC: 5
      LAB_STORM_THRESHOLD: 3
    # Chạy thủ công, song song với producer: docker compose run --rm monitor
